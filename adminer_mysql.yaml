version: '3.1'
name: sys

services:

  adminer:
    image: adminer
    depends_on:
      - db
    ports:
      - 8080:8080

  db:
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql
    volumes:
      - sysel_db:/var/lib/mysql
  
  php:
      image: php85:latest
      depends_on:
        - db
      expose:
        - 8000
      ports:
        - 8000:8000
      volumes:
        - ./:/var/www/
        - /var/www/vendor/
      working_dir: /var/www/
      #command: tail -f /dev/null
      command: php -S 0.0.0.0:8000 -t www

volumes:
  sysel_db:
    external: false
